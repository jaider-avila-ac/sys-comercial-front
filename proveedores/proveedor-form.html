<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proveedor · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
</head>
<body class="bg-light">
<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
<div class="container-fluid p-3 p-lg-4">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h4 class="mb-0" id="titulo">Nuevo Proveedor</h4>
    <a class="btn btn-outline-secondary" href="proveedores.html">
      <i class="bi bi-arrow-left me-1"></i> Volver
    </a>
  </div>

  <!-- DATOS DEL PROVEEDOR -->
  <div class="card shadow-sm mb-3">
    <div class="card-header"><strong>Datos del proveedor</strong></div>
    <div class="card-body">
      <form id="form">
        <div class="row g-3">

          <div class="col-12 col-md-6">
            <label class="form-label">Nombre / Razón social <span class="text-danger">*</span></label>
            <input class="form-control" id="nombre" maxlength="150" required/>
          </div>

          <div class="col-12 col-md-3">
            <label class="form-label">NIT / Cédula</label>
            <input class="form-control" id="nit" maxlength="30" placeholder="Ej: 900123456-1"/>
          </div>

          <div class="col-12 col-md-3">
            <label class="form-label">Ciudad</label>
            <input class="form-control" id="ciudad" maxlength="80"/>
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label">Contacto (representante)</label>
            <input class="form-control" id="contacto" maxlength="100"/>
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label">Teléfono</label>
            <input class="form-control" id="telefono" maxlength="30" placeholder="Ej: 3001234567"/>
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" maxlength="100"/>
          </div>

          <div class="col-12">
            <label class="form-label">Dirección</label>
            <input class="form-control" id="direccion" maxlength="200"/>
          </div>

          <div class="col-12 col-md-3">
            <label class="form-label">Tiempo de entrega (días)</label>
            <input type="number" min="0" step="1" class="form-control" id="tiempo_entrega_dias"
                   placeholder="Ej: 3"/>
          </div>

          <div class="col-12 col-md-3">
            <label class="form-label">Estado</label>
            <select class="form-select" id="is_activo">
              <option value="1">Activo</option>
              <option value="0">Inactivo</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">Notas</label>
            <textarea class="form-control" id="notas" rows="2"
                      placeholder="Condiciones, observaciones…"></textarea>
          </div>

        </div>

        <div class="d-flex align-items-center justify-content-between mt-4">
          <div class="small" id="msg"></div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-danger d-none" type="button" id="btnEliminar">
              <i class="bi bi-trash me-1"></i> Desactivar
            </button>
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-check2 me-1"></i> Guardar
            </button>
          </div>
        </div>

      </form>
    </div>
  </div>

  <!-- RESUMEN COMPRAS (solo en edición) -->
  <div class="card shadow-sm mb-3 d-none" id="seccionItems">
    <div class="card-header d-flex justify-content-between align-items-center">
      <strong>Resumen de compras</strong>
    </div>
    <div class="card-body" id="resumenCompras">—</div>
  </div>

  <!-- ITEMS HABITUALES (solo en edición) -->
  <div class="card shadow-sm d-none" id="seccionItems">
    <div class="card-header d-flex justify-content-between align-items-center">
      <strong>Productos habituales de este proveedor</strong>
      <span class="text-muted small">Items del catálogo con este proveedor asignado</span>
    </div>
    <div class="table-responsive">
      <table class="table table-sm align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Unidad</th>
            <th class="text-end">Precio compra</th>
            <th>Inventario</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbodyItems">
          <tr><td colspan="6" class="text-muted p-3">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Proveedor · SYS Comercial" });
</script>
<script type="module" src="./js/proveedor-form.controller.js"></script>
</body>
</html>
