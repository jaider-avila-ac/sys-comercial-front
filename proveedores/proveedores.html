<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proveedores · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
</head>
<body class="bg-light">
<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
<div class="container-fluid p-3 p-lg-4">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h4 class="mb-0">Proveedores</h4>
      <div class="text-muted small">Gestión de proveedores habituales</div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="../compras/compras.html">
        <i class="bi bi-cart3 me-1"></i> Compras
      </a>
      <a class="btn btn-primary" href="proveedor-form.html">
        <i class="bi bi-plus-lg me-1"></i> Nuevo proveedor
      </a>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">

      <div class="row g-2 align-items-end mb-3">
        <div class="col-12 col-md-6">
          <label class="form-label small text-muted">Buscar</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input id="search" class="form-control" placeholder="Nombre, NIT, contacto, email…"/>
          </div>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label small text-muted">Estado</label>
          <select id="filtroActivos" class="form-select">
            <option value="1">Solo activos</option>
            <option value="0">Todos</option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <button class="btn btn-outline-primary w-100" id="btnRefrescar">
            <i class="bi bi-arrow-clockwise me-1"></i> Refrescar
          </button>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead class="table-light">
            <tr>
              <th>Proveedor / NIT</th>
              <th>Contacto</th>
              <th>Teléfono</th>
              <th>Email</th>
              <th>Estado</th>
              <th class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="text-muted p-3">Cargando…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-3">
        <div class="text-muted small" id="pageInfo">—</div>
        <div class="btn-group">
          <button class="btn btn-outline-secondary btn-sm" id="btnPrev">
            <i class="bi bi-chevron-left"></i>
          </button>
          <button class="btn btn-outline-secondary btn-sm" id="btnNext">
            <i class="bi bi-chevron-right"></i>
          </button>
        </div>
      </div>

    </div>
  </div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Proveedores · SYS Comercial" });
</script>
<script type="module" src="./js/proveedores.controller.js"></script>
</body>
</html>
