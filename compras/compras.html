<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compras · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />
  <style>
    .btn-pagar {
      background: #198754;
      color: white;
      border: none;
    }
    .btn-pagar:hover {
      background: #157347;
      color: white;
    }
  </style>
</head>

<body class="bg-light">
  <div id="slotSidebar"></div>
  <div id="slotHeader"></div>

  <main class="app-main">
    <div class="container-fluid p-3 p-lg-4">

      <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
        <div>
          <h4 class="mb-0" id="pageTitle"><i class="bi bi-bag-check me-2 text-primary"></i>Compras</h4>
          <div class="text-muted small">Registro de compras</div>
        </div>
        <a class="btn btn-outline-secondary" href="../catalogo/catalogo.html">
          <i class="bi bi-arrow-left me-1"></i> Catálogo
        </a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">

          <div class="row g-2 align-items-end mb-3">
            <div class="col-6 col-md-3">
              <label class="form-label small text-muted">Buscar</label>
              <input id="searchInput" class="form-control form-control-sm" placeholder="Número o proveedor..." />
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label small text-muted">Estado</label>
              <select id="estadoFilter" class="form-select form-select-sm">
                <option value="">Todos</option>
                <option value="PENDIENTE">Pendiente</option>
                <option value="PARCIAL">Parcial</option>
                <option value="PAGADA">Pagada</option>
                <option value="ANULADA">Anulada</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label small text-muted">Desde</label>
              <input id="desdeFilter" type="date" class="form-control form-control-sm" />
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label small text-muted">Hasta</label>
              <input id="hastaFilter" type="date" class="form-control form-control-sm" />
            </div>
            <div class="col-auto">
              <button class="btn btn-outline-primary btn-sm" id="btnRefrescar" type="button">
                <i class="bi bi-arrow-clockwise"></i> Refrescar
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead class="table-light">
                <tr>
                  <th>Número</th>
                  <th>Proveedor</th>
                  <th>Detalle</th>
                  <th class="text-nowrap">Fecha</th>
                  <th class="text-end">Total</th>
                  <th class="text-end">Saldo</th>
                  <th>Estado</th>
                  <th class="text-end">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbodyCompras">
                <tr><td colspan="8" class="text-muted p-3 text-center">Cargando…</td><tr>
              </tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-muted small" id="pageInfo">—</div>
            <div class="btn-group">
              <button class="btn btn-outline-secondary btn-sm" id="btnPrev" type="button">
                <i class="bi bi-chevron-left"></i>
              </button>
              <button class="btn btn-outline-secondary btn-sm" id="btnNext" type="button">
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <!-- Modal Detalle -->
  <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Compra <span id="detalleNumero">—</span></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-2 mb-3 small">
            <div class="col-6 col-md-4">
              <div class="text-muted">Proveedor</div>
              <div class="fw-semibold" id="detalleProv">—</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="text-muted">Fecha</div>
              <div id="detalleFecha">—</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="text-muted">Condición</div>
              <div id="detalleCondicion">—</div>
            </div>
          </div>

          <div class="table-responsive mb-3">
            <table class="table table-sm">
              <thead class="table-light">
                <tr><th>Producto</th><th class="text-end">Cant.</th><th class="text-end">Precio</th><th class="text-end">Subtotal</th></tr>
              </thead>
              <tbody id="detalleLineas"></tbody>
            </table>
          </div>

          <div class="row text-end g-2 mb-3 small">
            <div class="col-6 col-md-3 ms-auto">
              <div class="text-muted">Subtotal</div>
              <div id="detalleSubtotal">—</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="text-muted">Impuestos</div>
              <div id="detalleImpuestos">—</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="text-muted">Total</div>
              <div class="fw-bold" id="detalleTotal">—</div>
            </div>
            <div class="col-6 col-md-3">
              <div class="text-muted">Saldo</div>
              <div class="fw-bold" id="detalleSaldo">—</div>
            </div>
          </div>

          <div id="secDetallePagos" class="d-none">
            <div class="text-muted small fw-semibold mb-2">Pagos registrados</div>
            <div class="table-responsive">
              <table class="table table-sm">
                <thead class="table-light"><tr><th>Fecha</th><th>Medio</th><th class="text-end">Monto</th><th>Notas</th></tr></thead>
                <tbody id="detallePagos"></tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cerrar</button>
          <button class="btn btn-outline-success d-none" id="btnDetalleConfirmar">Confirmar</button>
          <button class="btn btn-outline-primary d-none" id="btnDetallePagar">Registrar pago</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Pago -->
  <div class="modal fade" id="modalPago" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Registrar pago de compra</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="pagoCompraId" />
          <div class="alert alert-light border py-2 mb-3 small">
            Saldo pendiente: <strong id="pagoSaldoRef">—</strong>
          </div>
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">Fecha</label>
              <input type="date" class="form-control" id="pagoFecha" />
            </div>
            <div class="col-6">
              <label class="form-label">Monto</label>
              <input type="number" step="0.01" class="form-control" id="pagoMonto" />
            </div>
            <div class="col-6">
              <label class="form-label">Medio de pago</label>
              <select class="form-select" id="pagoMedio">
                <option value="TRANSFERENCIA">Transferencia</option>
                <option value="EFECTIVO">Efectivo</option>
                <option value="TARJETA">Tarjeta</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label">Notas (opcional)</label>
              <input class="form-control" id="pagoNotas" />
            </div>
          </div>
          <div class="text-danger small mt-2" id="pagoMsg"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" id="btnPagoOk">Registrar pago</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { bootLayout } from "../common/js/layout.js";
    await bootLayout({ title: "Compras · SYS Comercial" });
  </script>
  <script type="module" src="./js/compras.controller.js"></script>
</body>

</html>
