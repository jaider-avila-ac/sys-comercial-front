<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo e Inventario · SYS Comercial</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />
</head>

<body class="bg-light">
  <div id="slotSidebar"></div>
  <div id="slotHeader"></div>

  <main class="app-main">
    <div class="container-fluid p-3 p-lg-4">

      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h4 class="mb-0">Catálogo e Inventario</h4>
          <div class="text-muted small">Items + Stock (sin triggers, gestionado por Laravel)</div>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary" href="movimientos.html">
            <i class="bi bi-clock-history me-1"></i> Movimientos
          </a>
          <a class="btn btn-primary" href="item-form.html" id="btnNuevo">
            <i class="bi bi-plus-lg me-1"></i> Nuevo item
          </a>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">

          <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-md-5">
              <label class="form-label small text-muted">Buscar</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
                <input id="search" class="form-control" placeholder="Buscar por nombre o descripción...">
              </div>
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label small text-muted">Tipo</label>
              <select id="tipo" class="form-select">
                <option value="">Todos</option>
                <option value="PRODUCTO">PRODUCTO</option>
                <option value="INSUMO">INSUMO</option>
                <option value="SERVICIO">SERVICIO</option>
              </select>
            </div>

            <div class="col-12 col-md-2">
              <label class="form-label small text-muted">Solo inventario</label>
              <select id="soloControla" class="form-select">
                <option value="0" selected>No (todos)</option>
                <option value="1">Sí (solo inventario)</option>
              </select>
            </div>

            <div class="col-12 col-md-2">
              <button class="btn btn-outline-primary w-100" id="btnRefrescar">
                <i class="bi bi-arrow-clockwise me-1"></i> Refrescar
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead>
                <tr>
                  <th>Item</th>
                  <th class="text-nowrap">Tipo</th>
                  <th class="text-nowrap">Unidad</th>
                  <th class="text-nowrap text-end">Stock</th>
                  <th class="text-nowrap text-end">Mínimo</th>
                  <th class="text-nowrap">Inventario</th>
                  <th class="text-nowrap text-end">Acciones</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr>
                  <td colspan="7" class="text-muted">Cargando…</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-muted small" id="pageInfo">—</div>
            <div class="btn-group">
              <button class="btn btn-outline-secondary btn-sm" id="btnPrev"><i class="bi bi-chevron-left"></i></button>
              <button class="btn btn-outline-secondary btn-sm" id="btnNext"><i class="bi bi-chevron-right"></i></button>
            </div>
          </div>

        </div>
      </div>

    </div>
  </main>

  <!-- Modal Ajuste Stock -->
  <div class="modal fade" id="modalAjuste" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form class="modal-content" id="formAjuste">
        <div class="modal-header">
          <h5 class="modal-title">Ajustar inventario</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <div class="modal-body">
          <div class="mb-2">
            <div class="small text-muted">Item</div>
            <div class="fw-semibold" id="aj_itemNombre">—</div>
          </div>

          <div class="row g-2">
            <div class="col-12 col-md-6">
              <label class="form-label">Tipo</label>
              <select class="form-select" id="aj_tipo" required>
                <option value="ENTRADA">ENTRADA (suma)</option>
                <option value="SALIDA">SALIDA (resta)</option>
                <option value="AJUSTE">AJUSTE (nuevo stock)</option>
              </select>
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label">Cantidad</label>
              <input type="number" step="0.001" min="0" class="form-control" id="aj_cantidad" required>
            </div>

            <div class="col-12">
              <label class="form-label">Motivo</label>
              <input type="text" maxlength="120" class="form-control" id="aj_motivo"
                placeholder="Ej: Compra, conteo físico...">
            </div>

            <div class="col-12">
              <label class="form-label">Stock mínimo (opcional)</label>
              <input type="number" step="0.001" min="0" class="form-control" id="aj_stockMinimo">
            </div>
          </div>

          <div class="small mt-2" id="aj_msg"></div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" type="submit">
            <i class="bi bi-check2 me-1"></i> Guardar
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { bootLayout } from "../common/js/layout.js";
    await bootLayout({ title: "Catálogo e Inventario · SYS Comercial" });
  </script>

  <script type="module" src="js/catalogo.controller.js"></script>
</body>

</html>
