<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movimientos · SYS Comercial</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />

  <style>
    .tabla-movimientos {
      table-layout: fixed;
      width: 100%;
    }

    .tabla-movimientos th,
    .tabla-movimientos td {
      vertical-align: middle;
    }

    .col-fecha { width: 16%; }
    .col-tipo { width: 9%; }
    .col-cantidad { width: 5%; }
    .col-saldo { width: 10%; }
    .col-usuario { width: 16%; }
    .col-motivo { width: 14%; }
    .col-referencia { width: 13%; }
    .col-item { width: 17%; }

    .truncate {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: block;
    }

    .item-nombre {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }

    .item-meta {
      font-size: .78rem;
      color: #6c757d;
    }
  </style>
</head>

<body class="bg-light">
  <div id="slotSidebar"></div>
  <div id="slotHeader"></div>

  <main class="app-main">
    <div class="container-fluid p-3 p-lg-4">

      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h4 class="mb-0">Movimientos de inventario</h4>
          <div class="text-muted small">Historial de entradas, salidas y ajustes</div>
        </div>
        <a class="btn btn-outline-secondary" href="catalogo.html">
          <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">

          <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-md-3">
              <label class="form-label small text-muted">Item ID</label>
              <input id="itemId" class="form-control" placeholder="Ej: 10">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label small text-muted">Desde</label>
              <input id="desde" type="date" class="form-control">
            </div>

            <div class="col-12 col-md-3">
              <label class="form-label small text-muted">Hasta</label>
              <input id="hasta" type="date" class="form-control">
            </div>

            <div class="col-12 col-md-3">
              <button class="btn btn-outline-primary w-100" id="btnBuscar">
                <i class="bi bi-search me-1"></i> Buscar
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-sm align-middle tabla-movimientos mb-0">
              <thead class="table-light">
                <tr>
                  <th class="col-fecha">Fecha</th>
                  <th class="col-tipo">Tipo</th>
                  <th class="col-cantidad text-end">Cant.</th>
                  <th class="col-saldo text-center">Saldo</th>
                  <th class="col-usuario">Usuario</th>
                  <th class="col-motivo">Motivo</th>
                  <th class="col-referencia">Referencia</th>
                  <th class="col-item">Item</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr>
                  <td colspan="8" class="text-muted p-3">Cargando…</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-muted small" id="pageInfo">—</div>
            <div class="btn-group">
              <button class="btn btn-outline-secondary btn-sm" id="btnPrev">
                <i class="bi bi-chevron-left"></i>
              </button>
              <button class="btn btn-outline-secondary btn-sm" id="btnNext">
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { bootLayout } from "../common/js/layout.js";
    await bootLayout({ title: "Movimientos · SYS Comercial" });
  </script>

  <script type="module" src="js/movimientos.controller.js"></script>
</body>
</html>
