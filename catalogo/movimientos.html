<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movimientos · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />
</head>

<body class="bg-light">
  <div id="slotSidebar"></div>
  <div id="slotHeader"></div>

  <main class="app-main">
    <div class="container-fluid p-3 p-lg-4">

      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h4 class="mb-0">Movimientos de inventario</h4>
          <div class="text-muted small">Historial (ENTRADA / SALIDA / AJUSTE)</div>
        </div>
        <a class="btn btn-outline-secondary" href="catalogo.html">
          <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">

          <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-md-3">
              <label class="form-label small text-muted">Item ID (opcional)</label>
              <input id="itemId" class="form-control" placeholder="Ej: 10">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label small text-muted">Desde</label>
              <input id="desde" type="date" class="form-control">
            </div>
            <div class="col-12 col-md-3">
              <label class="form-label small text-muted">Hasta</label>
              <input id="hasta" type="date" class="form-control">
            </div>
            <div class="col-12 col-md-3">
              <button class="btn btn-outline-primary w-100" id="btnBuscar">
                <i class="bi bi-search me-1"></i> Buscar
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-sm align-middle">
              <thead class="table-light">
                <tr>
                  <th>Fecha</th>
                  <th>Tipo</th>
                  <th>Cantidad</th>
                  <th>Saldo</th>
                  <th>Usuario</th>
                  <th>Motivo</th>
                  <th>Referencia</th>
                  <th class="text-end">Item ID</th>
                </tr>
              </thead>
              <tbody id="tbody">
                <tr><td colspan="8" class="text-muted">Cargando…</td></tr>
              </tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-muted small" id="pageInfo">—</div>
            <div class="btn-group">
              <button class="btn btn-outline-secondary btn-sm" id="btnPrev">
                <i class="bi bi-chevron-left"></i>
              </button>
              <button class="btn btn-outline-secondary btn-sm" id="btnNext">
                <i class="bi bi-chevron-right"></i>
              </button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { bootLayout } from "../common/js/layout.js";
    await bootLayout({ title: "Movimientos · SYS Comercial" });
  </script>
  <script type="module" src="js/movimientos.controller.js"></script>
</body>
</html>
