<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item · SYS Comercial</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />
</head>

<body class="bg-light">
  <div id="slotSidebar"></div>
  <div id="slotHeader"></div>

  <main class="app-main">
    <div class="container-fluid p-3 p-lg-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h4 class="mb-0" id="titulo">Nuevo item</h4>
        <a class="btn btn-outline-secondary" href="catalogo.html">
          <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">

          <form id="form">
            <div class="row g-3">

              <div class="col-12 col-md-4">
                <label class="form-label">Tipo</label>
                <select class="form-select" id="tipo" required>
                  <option value="PRODUCTO">PRODUCTO</option>
                  <option value="INSUMO">INSUMO</option>
                  <option value="SERVICIO">SERVICIO</option>
                </select>
              </div>

              <div class="col-12 col-md-8">
                <label class="form-label">Nombre</label>
                <input class="form-control" id="nombre" maxlength="180" required />
              </div>

              <div class="col-12">
                <label class="form-label">Descripción</label>
                <textarea class="form-control" id="descripcion" rows="3"></textarea>
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Precio compra</label>
                <input type="number" step="0.01" min="0" class="form-control" id="precio_compra" />
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Precio venta sugerido</label>
                <input type="number" step="0.01" min="0" class="form-control" id="precio_venta_sugerido" />
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Unidad</label>
                <input class="form-control" id="unidad" maxlength="30" placeholder="Ej: UND, KG, HORA..." />
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Controla inventario</label>
                <select class="form-select" id="controla_inventario">
                  <option value="0">No</option>
                  <option value="1">Sí</option>
                </select>
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Stock mínimo</label>
                <input type="number" step="0.001" min="0" class="form-control" id="stock_minimo" disabled />
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Cantidad inicial</label>
                <input type="number" step="0.001" min="0" class="form-control" id="cantidad_inicial" disabled />
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Activo</label>
                <select class="form-select" id="is_activo">
                  <option value="1">Sí</option>
                  <option value="0">No</option>
                </select>
              </div>

            </div>

            <div class="d-flex align-items-center justify-content-between mt-4">
              <div class="small" id="msg"></div>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-danger d-none" type="button" id="btnEliminar">
                  <i class="bi bi-trash me-1"></i> Desactivar
                </button>
                <button class="btn btn-primary" type="submit">
                  <i class="bi bi-check2 me-1"></i> Guardar
                </button>
              </div>
            </div>

          </form>

        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { bootLayout } from "../common/js/layout.js";
    await bootLayout({ title: "Item · SYS Comercial" });
  </script>

  <script type="module" src="js/item-form.controller.js"></script>
</body>
</html>
