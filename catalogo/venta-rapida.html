<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venta Rápida · SYS Comercial</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />

  <style>
    .ac-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 1070;
      width: 100%;
      max-height: 260px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #c2cfe0;
      border-radius: .5rem;
      box-shadow: 0 .75rem 1.5rem rgba(0,0,0,.15);
      margin-top: 3px;
      display: none;
    }
    .ac-dropdown .ac-item {
      padding: .5rem .85rem;
      cursor: pointer;
      font-size: .875rem;
    }
    .ac-dropdown .ac-item:hover { background: #eef2ff; }
    .ac-dropdown .ac-meta { font-size: .75rem; color: #6c757d; }

    .total-box {
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      border-radius: .75rem;
      color: #fff;
      padding: 1.25rem 1.5rem;
    }
    .total-box .total-val {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.03em;
    }
    .total-box .total-lbl {
      font-size: .75rem;
      opacity: .8;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .tabla-historial thead th {
      background: #f8f9fa;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 2px solid #dee2e6;
    }
    .tabla-historial tbody td { font-size: .875rem; vertical-align: middle; }

    .item-selected-card {
      background: #f0f7ff;
      border: 1.5px solid #b8d9ff;
      border-radius: .6rem;
      padding: .75rem 1rem;
    }

    .bg-purple { background-color: #7c3aed !important; }
  </style>
</head>

<body class="bg-light">
  <div id="slotSidebar"></div>
  <div id="slotHeader"></div>

  <main class="app-main">
    <div class="container-fluid p-3 p-lg-4">

      <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
          <h4 class="mb-0">
            <i class="bi bi-lightning-charge-fill text-warning me-2"></i>Venta Rápida
          </h4>
          <div class="text-muted small">Registra ventas sin factura — copias, impresiones, insumos pequeños</div>
        </div>
        <a class="btn btn-outline-secondary" href="catalogo.html">
          <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
      </div>

      <div class="row g-4">

        <!-- ── Formulario ── -->
        <div class="col-12 col-lg-5">
          <div class="card shadow-sm h-100">
            <div class="card-body">
              <h6 class="fw-semibold mb-3">
                <i class="bi bi-search me-1 text-primary"></i>Buscar item
              </h6>

              <div class="mb-3 position-relative">
                <label class="form-label">Item <span class="text-danger">*</span></label>
                <input class="form-control" id="itemSearch"
                  placeholder="Escribe para buscar producto, insumo o servicio…"
                  autocomplete="off" />
                <input type="hidden" id="itemId" />
                <div id="itemDropdown" class="ac-dropdown"></div>
              </div>

              <div id="itemInfo" class="item-selected-card mb-3 d-none">
                <div class="d-flex align-items-start gap-2">
                  <i class="bi bi-box-seam text-primary mt-1"></i>
                  <div class="flex-grow-1 min-width-0">
                    <div class="fw-semibold" id="infoNombre">—</div>
                    <div class="small text-muted" id="infoTipo">—</div>
                    <div class="small mt-1" id="infoStock">—</div>
                  </div>
                  <button class="btn btn-sm btn-outline-secondary flex-shrink-0"
                    id="btnClearItem" title="Cambiar item">
                    <i class="bi bi-x-lg"></i>
                  </button>
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-6">
                  <label class="form-label fw-semibold">Cantidad <span class="text-danger">*</span></label>
                  <input type="number" step="0.001" min="0.001"
                    class="form-control" id="cantidad" placeholder="0" disabled />
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Valor unitario <span class="text-danger">*</span></label>
                  <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" step="1" min="0"
                      class="form-control" id="valorUnitario" placeholder="0" disabled />
                  </div>
                </div>
              </div>

              <div class="total-box mb-3">
                <div class="total-lbl">Total a registrar</div>
                <div class="total-val" id="totalDisplay">$ 0</div>
                <div class="small mt-1" style="opacity:.75" id="totalDetalle">—</div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-7">
                  <label class="form-label fw-semibold">Forma de pago <span class="text-danger">*</span></label>
                  <select class="form-select" id="formaPago">
                    <option value="">Seleccionar…</option>
                    <option value="EFECTIVO">Efectivo</option>
                    <option value="TRANSFERENCIA">Transferencia</option>
                    <option value="TARJETA">Tarjeta</option>
                    <option value="BILLETERA">Billetera/Nequi</option>
                    <option value="OTRO">Otro</option>
                  </select>
                </div>
                <div class="col-5">
                  <label class="form-label fw-semibold">Referencia <span class="text-muted fw-normal small">(opcional)</span></label>
                  <input type="text" class="form-control" id="referencia"
                    placeholder="# transacción…" maxlength="120" />
                </div>
              </div>

              <div class="small mb-2" id="msg"></div>
              <button class="btn btn-success w-100 py-2 fw-semibold" id="btnRegistrar" disabled>
                <i class="bi bi-check2-circle me-2"></i>Registrar venta
              </button>
            </div>
          </div>
        </div>

        <!-- ── Historial del día ── -->
        <div class="col-12 col-lg-7">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <h6 class="fw-semibold mb-0">
                  <i class="bi bi-clock-history me-1 text-secondary"></i>Ventas rápidas
                </h6>
                <div class="d-flex gap-2">
                  <div style="width: 150px;">
                    <input type="date" id="fechaSelector" class="form-control form-control-sm" 
                           style="font-size: 0.875rem;">
                  </div>
                  <button class="btn btn-sm btn-outline-secondary" id="btnRefresh" title="Refrescar">
                    <i class="bi bi-arrow-clockwise"></i>
                  </button>
                </div>
              </div>

              <div class="row g-2 mb-3">
                <div class="col-6">
                  <div class="bg-success bg-opacity-10 border border-success border-opacity-25 rounded-3 p-3 text-center">
                    <div class="fs-5 fw-bold text-success" id="kpiTotal">$ 0</div>
                    <div class="small text-muted">Total del día</div>
                  </div>
                </div>
                <div class="col-6">
                  <div class="bg-primary bg-opacity-10 border border-primary border-opacity-25 rounded-3 p-3 text-center">
                    <div class="fs-5 fw-bold text-primary" id="kpiCount">0</div>
                    <div class="small text-muted">Transacciones</div>
                  </div>
                </div>
              </div>

              <div class="table-responsive">
                <table class="table table-sm tabla-historial align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Item / Recibo</th>
                      <th class="text-end">Cant.</th>
                      <th class="text-end">V. Unit.</th>
                      <th class="text-center">Pago</th>
                      <th class="text-end">Total</th>
                    </tr>
                  </thead>
                  <tbody id="tbodyHistorial">
                    <tr><td colspan="5" class="text-center text-muted py-4">Cargando...</td></tr>
                  </tbody>
                </table>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { bootLayout } from "../common/js/layout.js";
    await bootLayout({ title: "Venta Rápida · SYS Comercial" });
  </script>

  <script type="module" src="js/venta-rapida.controller.js"></script>
</body>

</html>
