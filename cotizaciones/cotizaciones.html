<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cotizaciones · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
</head>
<body class="bg-light">

<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
  <div class="container-fluid p-3 p-lg-4">

    <div class="d-flex align-items-center justify-content-between mb-3">
      <div>
        <h4 class="mb-0">Cotizaciones</h4>
        <div class="text-muted small">Estados: BORRADOR · EMITIDA · VENCIDA · FACTURADA · ANULADA</div>
      </div>
      <a class="btn btn-primary" href="cotizacion-form.html">
        <i class="bi bi-plus-lg me-1"></i> Nueva
      </a>
    </div>

    <!-- Filtros -->
    <div class="card shadow-sm mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-12 col-md-6">
            <label class="form-label small text-muted">Buscar</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input id="search" class="form-control" placeholder="Número, notas, cliente…">
            </div>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label small text-muted">Estado</label>
            <select id="estado" class="form-select">
              <option value="">Todos</option>
              <option value="BORRADOR">BORRADOR</option>
              <option value="EMITIDA">EMITIDA</option>
              <option value="VENCIDA">VENCIDA</option>
              <option value="FACTURADA">FACTURADA</option>
              <option value="ANULADA">ANULADA</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <button id="btnRefrescar" class="btn btn-outline-primary w-100" type="button">
              <i class="bi bi-arrow-clockwise me-1"></i> Refrescar
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-sm align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Número</th>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Vence</th>
                <th class="text-end">Total</th>
                <th class="text-end" style="width:130px;">Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="7" class="text-muted p-3">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="small text-muted mt-2" id="msg"></div>

  </div>
</main>

<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Cotizaciones · SYS Comercial" });
</script>
<script type="module" src="./js/cotizaciones.controller.js"></script>
</body>
</html>
