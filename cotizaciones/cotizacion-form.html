<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cotización · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
  <style>
    /* ── Autocomplete dropdowns ─────────────────────────────────────── */
    .ac-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 1070;           /* por encima de todo */
      width: 320px;            /* ancho fijo para no depender del td */
      min-width: 100%;
      max-height: 300px;       /* suficiente para ~6 resultados */
      overflow-y: auto;
      background: #fff;
      border: 1px solid #c2cfe0;
      border-radius: .5rem;
      box-shadow: 0 .75rem 1.5rem rgba(0,0,0,.15);
      margin-top: 3px;
      display: none;
    }
    .ac-dropdown .ac-item {
      padding: .55rem .85rem;
      cursor: pointer;
      font-size: .875rem;
      line-height: 1.4;
    }
    .ac-dropdown .ac-item:hover,
    .ac-dropdown .ac-item:focus { background: #eef2ff; outline: none; }
    .ac-dropdown .ac-item-sub {
      font-size: .75rem;
      color: #6c757d;
      display: block;
    }
    .ac-dropdown .ac-divider {
      border-top: 1px solid #e9ecef;
      margin: .2rem 0;
    }
    .ac-dropdown .ac-link {
      padding: .45rem .85rem;
      font-size: .8rem;
      color: #0d6efd;
      display: flex;
      align-items: center;
      gap: .35rem;
      text-decoration: none;
    }
    .ac-dropdown .ac-link:hover { background: #f8f9fa; }

    /* ── CRÍTICO: permite que el dropdown salga de la tabla ─────────── */
    /*  table-responsive normalmente tiene overflow:auto que recorta    */
    /*  los dropdowns absolutos. Lo ponemos en visible para que se vean */
    .card .table-responsive { overflow: visible !important; }
    table { overflow: visible !important; }

    /* ── Columna item más ancha ─────────────────────────────────────── */
    .col-item-search { min-width: 220px; }
  </style>
</head>
<body class="bg-light">

<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
<div class="container-fluid p-3 p-lg-4">

  <!-- HEADER -->
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h4 id="title" class="mb-0">Nueva Cotización</h4>
    <a class="btn btn-outline-secondary" href="cotizaciones.html">
      <i class="bi bi-arrow-left me-1"></i> Volver
    </a>
  </div>

  <!-- DATOS GENERALES -->
  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-3">

        <!-- CLIENTE autocomplete -->
        <div class="col-12 col-md-4">
          <label class="form-label">Cliente <span class="text-danger">*</span></label>
          <div class="position-relative">
            <input id="cliente_search" class="form-control" type="text"
                   placeholder="Escribe nombre o documento…" autocomplete="off"/>
            <input id="cliente_id" type="hidden"/>
            <div id="cliente_dropdown" class="ac-dropdown"></div>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <label class="form-label">Fecha</label>
          <input id="fecha" type="date" class="form-control"/>
        </div>

        <div class="col-12 col-md-4">
          <label class="form-label">Fecha vencimiento</label>
          <input id="fecha_vencimiento" type="date" class="form-control"/>
        </div>

        <div class="col-12">
          <label class="form-label">Notas</label>
          <textarea id="notas" class="form-control" rows="2"></textarea>
        </div>

      </div>
    </div>
  </div>

  <!-- IVA: GLOBAL vs POR LÍNEA -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-2">
      <div class="d-flex align-items-center gap-4 flex-wrap">

        <strong class="small text-muted text-uppercase">Modo IVA</strong>

        <div class="btn-group btn-group-sm" role="group">
          <input type="radio" class="btn-check" name="modoIva" id="modoIvaGlobal" value="global" checked/>
          <label class="btn btn-outline-secondary" for="modoIvaGlobal">
            <i class="bi bi-percent me-1"></i> IVA global
          </label>

          <input type="radio" class="btn-check" name="modoIva" id="modoIvaLinea" value="linea"/>
          <label class="btn btn-outline-secondary" for="modoIvaLinea">
            <i class="bi bi-list-ul me-1"></i> IVA por línea
          </label>
        </div>

        <div id="wrapIvaGlobal" class="d-flex align-items-center gap-2">
          <label class="form-label mb-0 small">IVA %</label>
          <input id="ivaGlobal" type="number" step="0.01" min="0" max="100"
                 class="form-control form-control-sm" style="width:100px;" value="19"/>
          <span class="small text-muted">Se aplica a todas las líneas</span>
        </div>

      </div>
    </div>
  </div>

  <!-- LÍNEAS -->
  <div class="card shadow-sm mb-3">
    <div class="card-header d-flex justify-content-between align-items-center">
      <strong>Líneas</strong>
      <button class="btn btn-sm btn-outline-primary" id="btnAddLinea" type="button">
        <i class="bi bi-plus-lg me-1"></i> Agregar línea
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-sm align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th class="col-item-search">Producto / Servicio</th>
            <th>Descripción adicional</th>
            <th style="width:100px;">Cantidad</th>
            <th style="width:130px;">Valor Unit.</th>
            <th style="width:120px;">Descuento</th>
            <th style="width:95px;" id="thIvaPct" class="d-none">IVA %</th>
            <th class="text-end" style="width:130px;">Total línea</th>
            <th style="width:50px;"></th>
          </tr>
        </thead>
        <tbody id="tbodyLineas">
          <tr id="trVacio">
            <td colspan="8" class="text-muted p-3">Sin líneas. Haz clic en «Agregar línea».</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- TOTALES -->
  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-6 col-md-3">
          <div class="text-muted small">Subtotal</div>
          <div class="h5 mb-0" id="tSubtotal">$ 0</div>
        </div>
        <div class="col-6 col-md-3">
          <div class="text-muted small">Descuentos</div>
          <div class="h5 mb-0" id="tDesc">$ 0</div>
        </div>
        <div class="col-6 col-md-3">
          <div class="text-muted small">IVA</div>
          <div class="h5 mb-0" id="tIva">$ 0</div>
        </div>
        <div class="col-6 col-md-3 text-md-end">
          <div class="text-muted small">TOTAL</div>
          <div class="h4 mb-0 text-primary fw-bold" id="tTotal">$ 0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ACCIONES -->
  <div class="card shadow-sm">
    <div class="card-body d-flex flex-wrap gap-2 align-items-center">
      <button class="btn btn-primary" id="btnGuardar" type="button">
        <i class="bi bi-save me-1"></i> Guardar
      </button>
      <button class="btn btn-outline-success" id="btnEmitir" type="button">
        <i class="bi bi-check2-circle me-1"></i> Emitir
      </button>
      <button class="btn btn-outline-warning" id="btnConfirmarVigencia" type="button">
        <i class="bi bi-calendar-check me-1"></i> Confirmar vigencia
      </button>
      <button class="btn btn-outline-info" id="btnConvertir" type="button">
        <i class="bi bi-receipt me-1"></i> Convertir a factura
      </button>
      <button class="btn btn-outline-danger ms-auto" id="btnAnular" type="button">
        <i class="bi bi-x-circle me-1"></i> Anular
      </button>
    </div>
    <div id="msg" class="px-3 pb-3 small"></div>
  </div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Cotización · SYS Comercial" });
</script>
<script type="module" src="./js/cotizacion-form.controller.js"></script>
</body>
</html>
