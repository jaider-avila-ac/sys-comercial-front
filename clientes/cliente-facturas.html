<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facturas del Cliente · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
  <style>
    .kpi-card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: .75rem;
      padding: 1rem;
      transition: all .2s;
    }
    .kpi-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.08); }
    .kpi-value { font-size: 1.5rem; font-weight: 700; font-family: monospace; }
    .text-green { color: #198754; }
    .text-red { color: #dc3545; }
    .text-accent { color: #0d6efd; }
    .status-badge {
      padding: .25rem .5rem;
      border-radius: .25rem;
      font-size: .7rem;
      font-weight: 600;
      display: inline-block;
    }
    .status-EMITIDA { background: #d1e7dd; color: #0f5132; }
    .status-PAGADA { background: #cfe2ff; color: #084298; }
    .status-PARCIAL { background: #fff3cd; color: #997404; }
    .status-ANULADA { background: #f8d7da; color: #842029; }
    .status-BORRADOR { background: #e9ecef; color: #495057; }
    .btn-pagar { 
      background: #198754; 
      color: white; 
      border: none; 
    }
    .btn-pagar:hover { 
      background: #157347; 
      color: white;
    }
  </style>
</head>
<body class="bg-light">
<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
<div class="container-fluid p-3 p-lg-4">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h4 class="mb-0"><i class="bi bi-person-badge me-2 text-primary"></i>Facturas del Cliente</h4>
      <div class="text-muted small" id="clienteInfo">Cargando información del cliente...</div>
    </div>
    <a href="clientes.html" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Volver a clientes
    </a>
  </div>

  <!-- KPIs -->
  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="kpi-card">
        <div class="small text-muted">Total Facturado</div>
        <div class="kpi-value text-accent" id="totalFacturado">$0</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="kpi-card">
        <div class="small text-muted">Total Pagado</div>
        <div class="kpi-value text-green" id="totalPagado">$0</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="kpi-card">
        <div class="small text-muted">Saldo Pendiente Total</div>
        <div class="kpi-value text-red" id="totalSaldo">$0</div>
      </div>
    </div>
  </div>

  <!-- Tabla de facturas -->
  <div class="card shadow-sm">
    <div class="card-header bg-white">
      <h6 class="mb-0"><i class="bi bi-receipt me-2"></i>Facturas del Cliente</h6>
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>N° Factura</th>
              <th>Fecha</th>
              <th>Total</th>
              <th>Pagado</th>
              <th>Saldo</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyFacturas">
            <tr><td colspan="7" class="text-center text-muted py-4">Cargando facturas...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Facturas del Cliente · SYS Comercial" });
</script>
<script type="module" src="./js/cliente-facturas.controller.js"></script>
</body>
</html>
