<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cliente · SYS Comercial</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="../common/css/app.css"/>
</head>

<body class="bg-light">

<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
<div class="container-fluid p-3 p-lg-4">

<div class="card shadow-sm">
<div class="card-body">

<h5 id="title">Nuevo Cliente</h5>

<form id="form">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Nombre / Razón Social</label>
<input id="nombre" class="form-control" required>
</div>

<div class="col-md-3">
<label class="form-label">Tipo Doc</label>
<select id="tipo_documento" class="form-select">
<option>CC</option>
<option>NIT</option>
<option>CE</option>
<option>PAS</option>
<option>OTRO</option>
</select>
</div>

<div class="col-md-3">
<label class="form-label">Documento</label>
<input id="num_documento" class="form-control" required>
</div>

<div class="col-md-6">
<label class="form-label">Contacto</label>
<input id="contacto" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Email</label>
<input id="email" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Teléfono</label>
<input id="telefono" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Dirección</label>
<input id="direccion" class="form-control">
</div>

</div>

<div class="mt-4">
<button class="btn btn-primary">Guardar</button>
<a href="clientes.html" class="btn btn-secondary">Volver</a>
</div>

<div id="msg" class="mt-3 text-danger"></div>

</form>
</div>
</div>

</div>
</main>

<script type="module">
import { bootLayout } from "../common/js/layout.js";
await bootLayout({ title: "Cliente" });
</script>

<script type="module" src="./js/cliente-form.controller.js"></script>

</body>
</html>
