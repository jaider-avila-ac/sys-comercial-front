<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clientes · SYS Comercial</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
</head>

<body class="bg-light">

<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
  <div class="container-fluid p-3 p-lg-4">

    <div class="d-flex justify-content-between mb-3">
      <h4>Clientes</h4>

      <a class="btn btn-primary" href="cliente-form.html">
        <i class="bi bi-plus-lg"></i> Nuevo
      </a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">

        <div class="input-group mb-3">
          <span class="input-group-text">
            <i class="bi bi-search"></i>
          </span>
          <input id="search" class="form-control"
                 placeholder="Buscar cliente...">
        </div>

        <div class="table-responsive">
          <table class="table table-sm align-middle">
           <thead>
  <tr>
    <th>Nombre</th>
    <th>Documento</th>
    <th>Teléfono</th>
    <th>Email</th>
    <th class="text-end">Saldo a favor</th>
    <th class="text-end">Acciones</th>
  </tr>
</thead>

            <tbody id="tbody">
              <tr>
                <td colspan="5" class="text-muted">Cargando…</td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </div>

  </div>
</main>

<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Clientes · SYS Comercial" });
</script>

<script type="module" src="./js/clientes.controller.js"></script>

</body>
</html>
