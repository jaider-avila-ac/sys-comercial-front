<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clientes · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
</head>
<body class="bg-light">
<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
<div class="container-fluid p-3 p-lg-4">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h4 class="mb-0">Clientes</h4>
      <div class="text-muted small">Gestión de clientes y visualización de facturas</div>
    </div>
    <a class="btn btn-primary" href="cliente-form.html">
      <i class="bi bi-plus-lg me-1"></i> Nuevo cliente
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">

      <div class="input-group mb-3">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input id="search" class="form-control" placeholder="Nombre, documento, email…"/>
      </div>

      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead class="table-light">
            <tr>
              <th style="width:30%">Nombre</th>
              <th style="width:15%">Documento</th>
              <th style="width:15%">Teléfono</th>
              <th style="width:20%">Email</th>
              <th style="width:10%" class="text-end">Saldo a favor</th>
              <th style="width:10%" class="text-end">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="6" class="text-muted p-3 text-center">Cargando…</td></tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>

</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Clientes · SYS Comercial" });
</script>
<script type="module" src="./js/clientes.controller.js"></script>
</body>
</html>
