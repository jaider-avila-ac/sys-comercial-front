<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empresa · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />
  <style>
    .logo-preview {
      width: 140px; height: 140px;
      border: 2px dashed #dee2e6;
      border-radius: .5rem;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; cursor: pointer; background: #f8f9fa;
      transition: border-color .2s;
    }
    .logo-preview:hover { border-color: #0d6efd; }
    .logo-preview img { width:100%; height:100%; object-fit: contain; }
    .logo-preview .placeholder-icon { font-size: 2.5rem; color: #adb5bd; }
    .logo-label { font-size: .78rem; color: #6c757d; margin-top: .4rem; text-align:center; }
  </style>
</head>
<body class="bg-light">
<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
<div class="container-fluid p-3 p-lg-4">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h4 class="mb-0" id="tituloEmpresa">Empresa</h4>
    <a id="btnNueva" class="btn btn-primary d-none" href="empresa-form.html">
      <i class="bi bi-plus-lg me-1"></i> Nueva
    </a>
  </div>

  <!-- ── SUPER_ADMIN: listado ──────────────────────────────────────────── -->
  <section id="vistaListado" class="d-none">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input id="search" class="form-control" placeholder="Buscar por nombre o NIT…">
        </div>
        <div class="table-responsive">
          <table class="table table-sm align-middle">
            <thead class="table-light">
              <tr>
                <th style="width:50px;"></th>
                <th>Nombre</th>
                <th>NIT</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Estado</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody id="tbodyListado">
              <tr><td colspan="7" class="text-muted">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>

  <!-- ── EMPRESA_ADMIN: mi empresa ─────────────────────────────────────── -->
  <section id="vistaMiEmpresa" class="d-none">
    <div class="card shadow-sm">
      <div class="card-body">
        <form id="formMiEmpresa" class="row g-3">

          <!-- Logo -->
          <div class="col-12">
            <label class="form-label">Logo de la empresa</label>
            <div class="d-flex align-items-start gap-3 flex-wrap">
              <div>
                <div class="logo-preview" id="logoPreview" title="Clic para cambiar logo">
                  <i class="bi bi-building placeholder-icon" id="logoPlaceholder"></i>
                  <img id="logoImg" src="" alt="Logo" style="display:none;"/>
                </div>
                <div class="logo-label">Clic para subir imagen<br>(PNG, JPG · max 2 MB)</div>
              </div>
              <div class="d-flex flex-column gap-2 mt-1">
                <button class="btn btn-outline-secondary btn-sm" type="button" id="btnSubirLogo">
                  <i class="bi bi-upload me-1"></i> Cambiar logo
                </button>
                <button class="btn btn-outline-danger btn-sm" type="button" id="btnQuitarLogo" style="display:none;">
                  <i class="bi bi-trash me-1"></i> Quitar logo
                </button>
                <div class="text-muted small" id="logoStatus"></div>
              </div>
            </div>
            <input type="file" id="logoInput" accept="image/png,image/jpeg,image/webp" style="display:none;"/>
          </div>

          <!-- Datos generales -->
          <div class="col-12 col-lg-6">
            <label class="form-label">Nombre de la empresa <span class="text-danger">*</span></label>
            <input class="form-control" id="nombre" required maxlength="150"/>
          </div>
          <div class="col-12 col-lg-6">
            <label class="form-label">NIT / Identificación fiscal</label>
            <input class="form-control" id="nit" maxlength="30"/>
          </div>
          <div class="col-12 col-lg-6">
            <label class="form-label">Correo electrónico</label>
            <input class="form-control" id="email" type="email" maxlength="120"/>
          </div>
          <div class="col-12 col-lg-6">
            <label class="form-label">Teléfono</label>
            <input class="form-control" id="telefono" maxlength="40"/>
          </div>
          <div class="col-12">
            <label class="form-label">Dirección</label>
            <input class="form-control" id="direccion" maxlength="180"/>
          </div>

          <!-- Estado (solo SUPER_ADMIN ve esto al editar desde listado) -->
          <div class="col-12 col-lg-3 d-none" id="wrapIsActiva">
            <label class="form-label">Estado</label>
            <select class="form-select" id="is_activa">
              <option value="1">Activa</option>
              <option value="0">Inactiva</option>
            </select>
          </div>

          <!-- Info extra (readonly) -->
          <div class="col-12">
            <hr class="my-1"/>
            <div class="row g-2 mt-0">
              <div class="col-auto">
                <div class="text-muted small">Creada: <span id="infoCreatedAt">—</span></div>
              </div>
              <div class="col-auto">
                <div class="text-muted small">Actualizada: <span id="infoUpdatedAt">—</span></div>
              </div>
            </div>
          </div>

          <div class="col-12 d-flex gap-2 align-items-center">
            <button class="btn btn-primary" type="submit">
              <i class="bi bi-save me-1"></i> Guardar cambios
            </button>
            <div id="msgMiEmpresa" class="small align-self-center"></div>
          </div>

        </form>
      </div>
    </div>
  </section>

</div>
</main>

<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Empresa · SYS Comercial" });
</script>
<script type="module" src="js/empresa.controller.js"></script>
</body>
</html>
