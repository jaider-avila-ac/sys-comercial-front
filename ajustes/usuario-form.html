<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuario · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />
</head>
<body class="bg-light">
  <div id="slotSidebar"></div>
  <div id="slotHeader"></div>

  <main class="app-main">
    <div class="container-fluid p-3 p-lg-4" style="max-width:700px">

      <div class="d-flex align-items-center gap-2 mb-3">
        <a href="usuarios.html" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <h4 class="mb-0" id="tituloForm">Nuevo usuario</h4>
          <div class="text-muted small" id="subtituloForm">Completa los datos del usuario</div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">

          <div id="loadingMsg" class="text-muted small mb-3 d-none">Cargando datos…</div>

          <div class="row g-3">
            <div class="col-12 col-sm-6">
              <label class="form-label">Nombres <span class="text-danger">*</span></label>
              <input id="nombres" class="form-control" maxlength="80" />
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label">Apellidos</label>
              <input id="apellidos" class="form-control" maxlength="80" />
            </div>
            <div class="col-12">
              <label class="form-label">Email <span class="text-danger">*</span></label>
              <input id="email" type="email" class="form-control" maxlength="120" />
            </div>

            <div class="col-12 col-sm-6">
              <label class="form-label">Rol <span class="text-danger">*</span></label>
              <select id="rol" class="form-select">
                <option value="OPERATIVO">Operativo</option>
                <option value="EMPRESA_ADMIN">Empresa Admin</option>
                <!-- SUPER_ADMIN se agrega dinámicamente si el actor es SUPER_ADMIN -->
              </select>
            </div>

            <!-- empresa_id: solo visible para SUPER_ADMIN -->
            <div id="wrapEmpresa" class="col-12 col-sm-6 d-none">
              <label class="form-label">Empresa ID</label>
              <input id="empresa_id" type="number" class="form-control" min="1"
                     placeholder="ID de la empresa" />
              <div class="form-text">Obligatorio si el rol no es Super Admin.</div>
            </div>

            <div class="col-12 col-sm-6">
              <label class="form-label">Estado</label>
              <select id="is_activo" class="form-select">
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
              </select>
            </div>
          </div>

          <!-- ── Sección contraseña ──────────────────────────────────────── -->
          <hr class="my-4" />
          <div id="seccionPassword">
            <div class="d-flex align-items-center justify-content-between mb-2">
              <div>
                <div class="fw-semibold small">
                  <i class="bi bi-key me-1 text-primary"></i>
                  <span id="passTitle">Contraseña</span>
                </div>
                <div class="text-muted" style="font-size:.78rem" id="passSubtitle">
                  Requerida para crear el usuario.
                </div>
              </div>
              <!-- Botón para mostrar/ocultar el bloque en edición -->
              <button type="button" id="btnTogglePass"
                      class="btn btn-sm btn-outline-secondary d-none">
                <i class="bi bi-pencil me-1"></i>Cambiar contraseña
              </button>
            </div>

            <div id="wrapCamposPass" class="row g-3">
              <div class="col-12 col-sm-6">
                <label class="form-label small">Nueva contraseña</label>
                <input id="password" type="password" class="form-control"
                       placeholder="Mín. 8 caracteres, letras y números" />
              </div>
              <div class="col-12 col-sm-6">
                <label class="form-label small">Confirmar contraseña</label>
                <input id="passwordConfirm" type="password" class="form-control"
                       placeholder="Repite la contraseña" />
              </div>
            </div>
          </div>
          <!-- ── Fin sección contraseña ──────────────────────────────────── -->

          <div id="formErr" class="alert alert-danger mt-3 d-none"></div>
          <div id="formOk"  class="alert alert-success mt-3 d-none"></div>

          <div class="d-flex gap-2 mt-4">
            <button id="btnGuardar" class="btn btn-primary">
              <i class="bi bi-save me-1"></i>Guardar
            </button>
            <a href="usuarios.html" class="btn btn-outline-secondary">Cancelar</a>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { bootLayout } from "../common/js/layout.js";
    await bootLayout({ title: "Usuario · SYS Comercial" });
  </script>
  <script type="module" src="./js/usuario-form.controller.js"></script>
</body>
</html>
