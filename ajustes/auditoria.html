<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auditoría · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../common/css/app.css" />
</head>
<body class="bg-light">
  <div id="slotSidebar"></div>
  <div id="slotHeader"></div>

  <main class="app-main">
    <div class="container-fluid p-3 p-lg-4">

      <!-- Título -->
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <h4 class="mb-0"><i class="bi bi-shield-check me-2 text-primary"></i>Auditoría y accesos</h4>
          <div class="text-muted small">Historial de inicios de sesión y acciones del sistema</div>
        </div>
        <a href="usuarios.html" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-people me-1"></i>Usuarios
        </a>
      </div>

      <!-- Usuarios activos ahora -->
      <div class="card shadow-sm mb-3">
        <div class="card-header d-flex align-items-center justify-content-between py-2">
          <span class="fw-semibold small">
            <i class="bi bi-circle-fill text-success me-1" style="font-size:.5rem"></i>
            Usuarios activos recientemente
          </span>
          <div class="d-flex align-items-center gap-2">
            <select id="selMinutos" class="form-select form-select-sm" style="width:auto">
              <option value="15">Últimos 15 min</option>
              <option value="30" selected>Últimos 30 min</option>
              <option value="60">Última hora</option>
              <option value="480">Últimas 8 h</option>
            </select>
            <button id="btnRefreshActivos" class="btn btn-sm btn-outline-secondary">
              <i class="bi bi-arrow-clockwise"></i>
            </button>
          </div>
        </div>
        <div class="card-body p-0">
          <div id="activosWrap" class="d-flex flex-wrap gap-2 p-3">
            <span class="text-muted small">Cargando…</span>
          </div>
        </div>
      </div>

      <!-- Historial de sesiones (visible solo cuando hay usuario_id en URL o filtro) -->
      <div id="sesionesSection" class="card shadow-sm mb-3" style="display:none">
        <div class="card-header d-flex align-items-center justify-content-between py-2">
          <span class="fw-semibold small">
            <i class="bi bi-box-arrow-in-right me-1 text-success"></i>
            Historial de inicios de sesión
          </span>
          <span id="sesionesUsuarioLabel" class="badge bg-info-subtle text-info border border-info-subtle small"></span>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Fecha y hora</th>
                  <th>IP</th>
                  <th>Dispositivo</th>
                  <th>Navegador</th>
                  <th>User Agent completo</th>
                </tr>
              </thead>
              <tbody id="tbodySesiones">
                <tr><td colspan="5" class="text-muted p-3">—</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center py-2">
          <div class="text-muted small" id="sesionesPageInfo">—</div>
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary" id="btnSesionesPrev">
              <i class="bi bi-chevron-left"></i>
            </button>
            <button class="btn btn-outline-secondary" id="btnSesionesNext">
              <i class="bi bi-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Historial de auditoría -->
      <div class="card shadow-sm">
        <div class="card-header py-2">
          <span class="fw-semibold small"><i class="bi bi-journal-text me-1"></i>Historial de acciones</span>
        </div>
        <div class="card-body py-2">
          <div class="row g-2 align-items-end mb-3">
            <div class="col-12 col-md-3">
              <label class="form-label small text-muted">Usuario ID (opcional)</label>
              <input id="filtroUsuarioId" class="form-control form-control-sm" placeholder="Ej: 5" />
            </div>
            <div class="col-12 col-md-2">
              <label class="form-label small text-muted">Acción</label>
              <select id="filtroAccion" class="form-select form-select-sm">
                <option value="">Todas</option>
                <option value="LOGIN">Login</option>
                <option value="LOGOUT">Logout</option>
                <option value="CREAR">Crear</option>
                <option value="EDITAR">Editar</option>
                <option value="ELIMINAR">Eliminar</option>
                <option value="TOGGLE">Toggle estado</option>
                <option value="CAMBIO_CLAVE">Cambio clave</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label small text-muted">Desde</label>
              <input id="filtroDes" type="date" class="form-control form-control-sm" />
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label small text-muted">Hasta</label>
              <input id="filtroHas" type="date" class="form-control form-control-sm" />
            </div>
            <div class="col-12 col-md-3">
              <button id="btnBuscar" class="btn btn-sm btn-outline-primary w-100">
                <i class="bi bi-search me-1"></i>Buscar
              </button>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Fecha</th>
                  <th>Usuario</th>
                  <th>Acción</th>
                  <th>Entidad</th>
                  <th>Descripción</th>
                  <th>IP</th>
                </tr>
              </thead>
              <tbody id="tbodyAudit">
                <tr><td colspan="6" class="text-muted p-3">Cargando…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center py-2">
          <div class="text-muted small" id="auditPageInfo">—</div>
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-secondary" id="btnPrev">
              <i class="bi bi-chevron-left"></i>
            </button>
            <button class="btn btn-outline-secondary" id="btnNext">
              <i class="bi bi-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { bootLayout } from "../common/js/layout.js";
    await bootLayout({ title: "Auditoría · SYS Comercial" });
  </script>
  <script type="module" src="./js/auditoria.controller.js"></script>
</body>
</html>
