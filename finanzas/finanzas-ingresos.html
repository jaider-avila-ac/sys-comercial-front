<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ingresos · Finanzas · SYS Comercial</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
  <link rel="stylesheet" href="./js/finanzas.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>

<body class="bg-light">
<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
  <div class="container-fluid p-3 p-lg-4">

    <!-- HEADER -->
    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
      <div>
        <h4 class="mb-0">
          <i class="bi bi-plus-circle me-2 text-success"></i>Ingresos
        </h4>
        <div class="text-muted small">Todos los ingresos: pagos de facturas, ventas mostrador e ingresos manuales</div>
      </div>

      <a href="./finanzas.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver a finanzas
      </a>
    </div>

    <!-- FILTROS -->
    <div class="card shadow-sm mb-3">
      <div class="card-body py-2">
        <div class="row g-2 align-items-end">

          <div class="col-12 col-md-3">
            <label class="form-label form-label-sm mb-1">Buscar</label>
            <input id="ingresosSearch" class="form-control form-control-sm"
                   placeholder="Recibo, descripción o referencia...">
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label form-label-sm mb-1">Tipo</label>
            <select id="ingresoTipo" class="form-select form-select-sm">
              <option value="">Todos</option>
              <option value="PAGO_FACTURA">Pagos de facturas</option>
              <option value="VENTA_MOSTRADOR">Ventas mostrador</option>
              <option value="INGRESO_MANUAL">Ingresos manuales</option>
            </select>
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label form-label-sm mb-1">Estado</label>
            <select id="ingresosEstado" class="form-select form-select-sm">
              <option value="">Todos</option>
              <option value="ACTIVO">Activos</option>
              <option value="ANULADO">Anulados</option>
            </select>
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label form-label-sm mb-1">Desde</label>
            <input id="ingresosDesde" type="date" class="form-control form-control-sm">
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label form-label-sm mb-1">Hasta</label>
            <input id="ingresosHasta" type="date" class="form-control form-control-sm">
          </div>

          <div class="col-12 col-md-1">
            <button id="btnIngresosRefresh" class="btn btn-outline-primary btn-sm w-100">
              <i class="bi bi-arrow-clockwise me-1"></i>
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- LISTADO -->
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="mb-0">
        <i class="bi bi-plus-circle text-success me-1"></i>Listado de ingresos
      </h6>

      <button class="btn btn-sm btn-success" id="btnNuevoIngresoManual">
        <i class="bi bi-plus me-1"></i>Nuevo ingreso manual
      </button>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-fin align-middle mb-0">
            <thead>
              <tr>
                <th>Recibo</th>
                <th>Fecha</th>
                <th>Descripción</th>
                <th>Forma de pago</th>
                <th>Referencia</th>
                <th class="text-end">Monto</th>
                <th style="width:100px"></th>
              </tr>
            </thead>

            <tbody id="tbodyIngresos">
              <tr>
                <td colspan="7" class="text-muted text-center py-3">Cargando…</td>
              </tr>
            </tbody>
            <tfoot class="table-light">
              <tr>
                <td colspan="5" class="text-end fw-semibold">TOTAL:</td>
                <td class="text-end fw-semibold text-success" id="totalIngresos">$0</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- MODAL -->
<div class="modal fade" id="modalIngresoManual" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalIngresoTitle">Nuevo ingreso manual</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="hidden" id="ingresoManualId">

        <div class="mb-2">
          <label class="form-label small">Descripción *</label>
          <input id="ingresoManualDescripcion" class="form-control form-control-sm" maxlength="255">
        </div>

        <div class="mb-2">
          <label class="form-label small">Monto *</label>
          <input id="ingresoManualMonto" type="number" class="form-control form-control-sm" step="0.01" min="0.01">
        </div>

        <div class="mb-2">
          <label class="form-label small">Archivo</label>
          <input id="ingresoArchivo" type="file" class="form-control form-control-sm">
        </div>

        <div id="ingresoArchivoActual" class="d-none mb-2 small">
          Archivo:
          <a id="ingresoArchivoLink" href="#" target="_blank"></a>
        </div>

        <div class="mb-2">
          <label class="form-label small">Notas</label>
          <textarea id="ingresoNotas" class="form-control form-control-sm" rows="2" maxlength="255"></textarea>
        </div>

        <div class="form-text mb-2">
          La fecha la asigna automáticamente el sistema.
        </div>

        <div id="ingresoMsg" class="small mt-2"></div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button id="btnGuardarIngresoManual" class="btn btn-success">
          <i class="bi bi-check2 me-1"></i>Guardar
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Ingresos · Finanzas · SYS Comercial" });
</script>

<script type="module" src="./js/finanzas.ingresos.js"></script>

</body>
</html>
