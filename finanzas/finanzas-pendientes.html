<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saldos pendientes · Finanzas · SYS Comercial</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="./js/finanzas.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>

<body class="bg-light">
<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
  <div class="container-fluid p-3 p-lg-4">

    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
      <div>
        <h4 class="mb-0"><i class="bi bi-hourglass me-2 text-danger"></i>Saldos pendientes</h4>
        <div class="text-muted small">Facturas emitidas con saldo pendiente</div>
      </div>
      <a href="./finanzas.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver a finanzas
      </a>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-body py-2">
        <div class="row g-2 align-items-end">
          <div class="col-12 col-md-7">
            <div class="input-group input-group-sm">
              <span class="input-group-text"><i class="bi bi-search"></i></span>
              <input id="pendSearch" class="form-control" placeholder="Número de factura o cliente…"/>
            </div>
          </div>
          <div class="col-12 col-md-3">
            <button id="btnPendRefresh" class="btn btn-sm btn-outline-primary w-100" type="button">
              <i class="bi bi-arrow-clockwise me-1"></i>Refrescar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-fin align-middle mb-0">
            <thead>
              <tr>
                <th>Factura</th>
                <th>Cliente</th>
                <th>Fecha</th>
                <th class="text-end">Total</th>
                <th class="text-end">Pagado</th>
                <th class="text-end">Saldo</th>
                <th style="width:80px"></th>
              </tr>
            </thead>
            <tbody id="tbodyPend">
              <tr><td colspan="7" class="text-muted p-3 text-center">Cargando…</td></tr>
            </tbody>
            <tfoot class="tfoot-total">
              <tr>
                <td colspan="4" class="text-end small text-muted">Totales →</td>
                <td class="text-end" id="footPendPagado">—</td>
                <td class="text-end text-danger" id="footPendSaldo">—</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- NO necesitas el modal de pago aquí porque pagos.ui.js lo crea automáticamente -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Saldos pendientes · Finanzas · SYS Comercial" });
</script>
<script type="module" src="./js/finanzas.pendientes.js"></script>
</body>
</html>
