<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Egresos · Finanzas · SYS Comercial</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="../common/css/app.css"/>
  <link rel="stylesheet" href="./js/finanzas.css"/>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>

<body class="bg-light">
<div id="slotSidebar"></div>
<div id="slotHeader"></div>

<main class="app-main">
  <div class="container-fluid p-3 p-lg-4">

    <!-- HEADER -->
    <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
      <div>
        <h4 class="mb-0">
          <i class="bi bi-dash-circle me-2 text-danger"></i>Egresos
        </h4>
        <div class="text-muted small">Todos los egresos: compras y gastos manuales</div>
      </div>

      <a href="./finanzas.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver a finanzas
      </a>
    </div>

    <!-- FILTROS -->
    <div class="card shadow-sm mb-3">
      <div class="card-body py-2">
        <div class="row g-2 align-items-end">

          <div class="col-12 col-md-3">
            <label class="form-label form-label-sm mb-1">Buscar</label>
            <input id="egresosSearch" class="form-control form-control-sm"
                   placeholder="Número, descripción o notas...">
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label form-label-sm mb-1">Tipo</label>
            <select id="egresosTipo" class="form-select form-select-sm">
              <option value="">Todos</option>
              <option value="EGRESO_COMPRA">Egresos compras</option>
              <option value="EGRESO_MANUAL">Egresos manuales</option>
            </select>
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label form-label-sm mb-1">Estado</label>
            <select id="egresosEstado" class="form-select form-select-sm">
              <option value="">Todos</option>
              <option value="ACTIVO">Activos</option>
              <option value="ANULADO">Anulados</option>
            </select>
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label form-label-sm mb-1">Desde</label>
            <input id="egresosDesde" type="date" class="form-control form-control-sm">
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label form-label-sm mb-1">Hasta</label>
            <input id="egresosHasta" type="date" class="form-control form-control-sm">
          </div>

          <div class="col-12 col-md-1">
            <button id="btnEgresosRefresh" class="btn btn-outline-primary btn-sm w-100">
              <i class="bi bi-arrow-clockwise me-1"></i>
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- LISTADO -->
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="mb-0">
        <i class="bi bi-dash-circle text-danger me-1"></i>Listado de egresos
      </h6>

      <button class="btn btn-sm btn-danger" id="btnNuevoEgreso">
        <i class="bi bi-plus me-1"></i>Nuevo egreso manual
      </button>
    </div>

    <div class="card shadow-sm">
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-fin align-middle mb-0">
            <thead>
              <tr>
                <th>Número</th>
                <th>Fecha</th>
                <th>Descripción</th>
                <th>Archivo</th>
                <th>Notas</th>
                <th>Tipo</th>
                <th class="text-end">Monto</th>
                <th style="width:100px"></th>
              </td>
            </thead>

            <tbody id="tbodyEgresos">
              <tr>
                <td colspan="8" class="text-muted text-center py-3">Cargando…</td>
              </tr>
            </tbody>
            <tfoot class="table-light">
              <tr>
                <td colspan="6" class="text-end fw-semibold">TOTAL:</td>
                <td class="text-end fw-semibold text-danger" id="totalEgresos">$0</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

  </div>
</main>

<!-- MODAL -->
<div class="modal fade" id="modalEgreso" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalEgresoTitle">Nuevo egreso manual</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="egresoId">

        <div class="mb-2">
          <label class="form-label small">Descripción *</label>
          <input id="egresoDescripcion" class="form-control form-control-sm">
        </div>

        <div class="mb-2">
          <label class="form-label small">Monto *</label>
          <input id="egresoMonto" type="number" class="form-control form-control-sm">
        </div>

        <div class="mb-2">
          <label class="form-label small">Archivo</label>
          <input id="egresoArchivo" type="file" class="form-control form-control-sm">
        </div>

        <div id="egresoArchivoActual" class="d-none mb-2 small">
          Archivo:
          <a id="egresoArchivoLink" href="#" target="_blank"></a>
        </div>

        <div class="mb-2">
          <label class="form-label small">Notas</label>
          <textarea id="egresoNotas" class="form-control form-control-sm"></textarea>
        </div>

        <div class="form-text mb-2">
          La fecha la asigna automáticamente el sistema.
        </div>

        <div id="egresoMsg" class="small mt-2"></div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button id="btnGuardarEgreso" class="btn btn-danger">
          <i class="bi bi-check2 me-1"></i>Guardar
        </button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  import { bootLayout } from "../common/js/layout.js";
  await bootLayout({ title: "Egresos · Finanzas · SYS Comercial" });
</script>

<script type="module" src="./js/finanzas.egresos.js"></script>

</body>
</html>
