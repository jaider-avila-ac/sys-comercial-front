<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Restringido</title>
  <!-- Sin meta description ni robots -->
  <meta name="robots" content="noindex, nofollow" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --sa-bg:      #0b0f1a;
      --sa-surface: #111827;
      --sa-border:  #1f2d40;
      --sa-accent:  #dc2626;
      --sa-accent2: #b91c1c;
      --sa-text:    #e5e7eb;
      --sa-muted:   #6b7280;
      --sa-input:   #1a2535;
      --sa-glow:    rgba(220, 38, 38, .18);
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      background: var(--sa-bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    /* Fondo con grid sutil */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(220,38,38,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(220,38,38,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .sa-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
    }

    /* Alerta de acceso restringido */
    .sa-restricted-notice {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: rgba(220,38,38,.1);
      border: 1px solid rgba(220,38,38,.25);
      border-radius: .4rem;
      padding: .5rem .75rem;
      margin-bottom: 1.25rem;
      font-size: .72rem;
      color: #fca5a5;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .sa-restricted-notice i { font-size: .9rem; flex-shrink: 0; }

    .sa-card {
      background: var(--sa-surface);
      border: 1px solid var(--sa-border);
      border-radius: .75rem;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(220,38,38,.06),
        0 20px 60px rgba(0,0,0,.5),
        0 0 80px var(--sa-glow);
    }

    .sa-header {
      background: linear-gradient(135deg, #1a0505 0%, #1f0707 50%, #16050a 100%);
      border-bottom: 1px solid rgba(220,38,38,.2);
      padding: 1.75rem 1.5rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .sa-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(220,38,38,.5), transparent);
    }

    .sa-logo {
      width: 52px; height: 52px;
      background: rgba(220,38,38,.12);
      border: 1.5px solid rgba(220,38,38,.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto .85rem;
      font-size: 1.4rem;
      color: var(--sa-accent);
    }

    .sa-header h4 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--sa-text);
      margin: 0 0 .2rem;
      letter-spacing: .04em;
    }
    .sa-header small {
      font-size: .72rem;
      color: var(--sa-muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .sa-body { padding: 1.5rem; }

    .sa-label {
      display: block;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--sa-muted);
      margin-bottom: .35rem;
    }

    .sa-input {
      width: 100%;
      background: var(--sa-input);
      border: 1px solid var(--sa-border);
      border-radius: .4rem;
      color: var(--sa-text);
      padding: .65rem .85rem;
      font-size: .9rem;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      -webkit-appearance: none;
    }
    .sa-input::placeholder { color: #374151; }
    .sa-input:focus {
      border-color: rgba(220,38,38,.5);
      box-shadow: 0 0 0 3px rgba(220,38,38,.12);
    }

    .sa-input-wrap {
      position: relative;
    }
    .sa-input-wrap .sa-eye {
      position: absolute;
      right: .75rem; top: 50%;
      transform: translateY(-50%);
      color: var(--sa-muted);
      cursor: pointer;
      font-size: .95rem;
      transition: color .15s;
    }
    .sa-input-wrap .sa-eye:hover { color: var(--sa-text); }
    .sa-input-wrap .sa-input { padding-right: 2.5rem; }

    .sa-field { margin-bottom: 1rem; }

    .sa-btn {
      width: 100%;
      background: var(--sa-accent);
      color: #fff;
      border: none;
      border-radius: .4rem;
      padding: .7rem 1rem;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-top: 1.25rem;
    }
    .sa-btn:hover:not(:disabled) {
      background: var(--sa-accent2);
      box-shadow: 0 0 20px rgba(220,38,38,.35);
    }
    .sa-btn:disabled { opacity: .55; cursor: not-allowed; }

    .sa-error {
      background: rgba(220,38,38,.1);
      border: 1px solid rgba(220,38,38,.3);
      color: #fca5a5;
      border-radius: .35rem;
      padding: .55rem .75rem;
      font-size: .8rem;
      margin-top: .85rem;
      display: none;
    }

    .sa-footer {
      text-align: center;
      padding: .75rem 1.5rem 1rem;
      font-size: .7rem;
      color: #374151;
      border-top: 1px solid var(--sa-border);
      letter-spacing: .04em;
    }

    /* Spinner */
    .sa-spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="sa-wrapper">
    <div class="sa-restricted-notice">
      <i class="bi bi-shield-lock-fill"></i>
      Área de acceso restringido · Solo administración del sistema
    </div>

    <div class="sa-card">
      <div class="sa-header">
        <div class="sa-logo"><i class="bi bi-person-badge-fill"></i></div>
        <h4>Panel de Administración</h4>
        <small>SYS Comercial · Sistema</small>
      </div>

      <div class="sa-body">
        <div class="sa-field">
          <label class="sa-label" for="saEmail">
            <i class="bi bi-envelope me-1"></i>Correo del administrador
          </label>
          <input
            id="saEmail" type="email" class="sa-input"
            placeholder="admin@syscomercial.app"
            autocomplete="username"
          />
        </div>

        <div class="sa-field">
          <label class="sa-label" for="saPassword">
            <i class="bi bi-key me-1"></i>Contraseña
          </label>
          <div class="sa-input-wrap">
            <input
              id="saPassword" type="password" class="sa-input"
              placeholder="••••••••••••"
              autocomplete="current-password"
            />
            <span class="sa-eye" id="saToggleEye">
              <i class="bi bi-eye" id="saEyeIcon"></i>
            </span>
          </div>
        </div>

        <div class="sa-error" id="saMsg"></div>

        <button class="sa-btn" id="saBtnLogin">
          <span id="saBtnText">Acceder al sistema</span>
          <div class="sa-spinner" id="saSpinner"></div>
        </button>
      </div>

      <div class="sa-footer">
        Sesión cifrada · Todos los accesos son registrados
      </div>
    </div>
  </div>

  <script type="module" src="./login-sa.js"></script>
</body>
</html>
