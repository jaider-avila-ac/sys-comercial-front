<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow-lg border-0" style="max-width:420px; width:100%;">
    <div class="card-header text-center bg-primary text-white py-4">
      <i class="bi bi-building-check fs-1"></i>
      <h4 class="fw-bold mb-0">SYS Comercial</h4>
      <small class="opacity-75">Multiempresa · Ingresa a tu cuenta</small>
    </div>

    <div class="card-body p-4">
      <form id="formLogin" novalidate>
        <div class="form-floating mb-3">
          <input type="email" class="form-control" id="email" placeholder="correo@empresa.com" required
            autocomplete="username">
          <label for="email"><i class="bi bi-envelope me-1"></i> Correo electrónico</label>
        </div>

        <div class="form-floating mb-3 position-relative">
          <input type="password" class="form-control pe-5" id="password" placeholder="Contraseña" required
            autocomplete="current-password">
          <label for="password"><i class="bi bi-lock me-1"></i> Contraseña</label>
          <span class="position-absolute top-50 end-0 translate-middle-y me-3" style="cursor:pointer" id="togglePass">
            <i class="bi bi-eye text-secondary" id="eyeIcon"></i>
          </span>
        </div>

        <div id="msg" class="text-danger small mb-3"></div>

        <button type="submit" class="btn btn-primary w-100 d-flex justify-content-center align-items-center"
          id="btnLogin">
          <span id="btnText">Ingresar</span>
          <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
        </button>
      </form>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>

</html>
